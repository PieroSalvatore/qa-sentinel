name: Cross-Channel Viability Spike

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  spike-test:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Appium
      run: |
        npm install -g appium
        appium driver install uiautomator2

    - name: Start Appium Server
      run: appium --log-timestamp --log-no-colors > appium.log &

    - name: Download Demo App
      run: |
        mkdir -p app
        curl -L -o app/Android.SauceLabs.Mobile.Sample.app.apk https://github.com/saucelabs/sample-app-mobile/releases/download/2.7.1/Android.SauceLabs.Mobile.Sample.app.2.7.1.apk

    - name: Run Spike Test on Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: default
        arch: x86_64
        profile: Nexus 6
        script: mvn clean test -Dtest=CrossChannelSpikeTest
