name: Cross-Channel Viability Spike

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  spike-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Appium and Playwright Browsers
      run: |
        npm install -g appium@next
        appium driver install uiautomator2
        npx playwright install --with-deps chromium

    - name: Download Demo App
      run: |
        mkdir -p app
        # ApiDemos: app oficial de Appium, universal x86_64 - siempre lanza en emuladores Intel
        curl --fail -L -o app/ApiDemos.apk \
          https://github.com/appium/appium/raw/master/packages/appium/sample-code/apps/ApiDemos-debug.apk
        echo "APK size: $(wc -c < app/ApiDemos.apk) bytes"

    # KVM DEBE ir ANTES del emulador
    - name: Enable KVM Hardware Acceleration
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Run Spike Test on Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: default
        arch: x86_64
        profile: Nexus 6
        # Appium se inicia DENTRO del script, cuando el emulador ya está listo
        script: |
          appium --relaxed-security --log-timestamp --log-no-colors > appium.log &
          sleep 5
          mvn clean test -Dtest=CrossChannelSpikeTest
